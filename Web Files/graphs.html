<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO2 Emission Analysis — Graphs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>

        /* top bar: heading left, dropdown right */
        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            /* must be above the content below */
            position: relative;
            z-index: 200;
        }

        /* dropdown wrapper — must sit ABOVE the content area */
        .select-wrapper {
            position: relative;
            min-width: 280px;
            z-index: 200;
        }

        .select-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: var(--ease);
        }

        .select-btn:hover,
        .select-btn.is-open {
            background: var(--accent);
            color: #050505;
            box-shadow: 0 0 14px var(--accent-glow);
        }

        /* dropdown panel — floats over everything */
        .options-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border-hover);
            border-radius: 4px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.8);
            overflow: hidden;
            /* float above everything on the page */
            z-index: 9999;
        }

        .options-list.show { display: block; }

        .option-item {
            padding: 12px 18px;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s, color 0.15s;
        }

        .option-item:last-child { border-bottom: none; }
        .option-item:hover { background: var(--surface2); color: var(--accent); }

        /* fuel sub-group header */
        .group-header {
            padding: 12px 18px;
            cursor: pointer;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            background: rgba(29,185,84,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.15s;
            user-select: none;
        }

        .group-header:hover { background: rgba(29,185,84,0.12); }
        .group-arrow { font-size: 0.7rem; transition: transform 0.2s; }
        .group-header.open .group-arrow { transform: rotate(180deg); }

        .sub-items { display: none; }
        .sub-items.open { display: block; }

        .sub-option-item {
            padding: 10px 18px 10px 32px;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s, color 0.15s;
        }

        .sub-option-item:last-child { border-bottom: none; }
        .sub-option-item:hover { background: var(--surface2); color: var(--accent); }

        .sub-option-item::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        /* content area below the title row — no z-index so dropdown sits above it */
        .content-area {
            display: flex;
            gap: 28px;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        .chart-box {
            flex-shrink: 0;
            width: 62%;
            border: 3px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            background: #000;
        }

        /* override the global grayscale filter from style.css */
        .chart-box img {
            width: 100%;
            height: auto;
            display: block;
            filter: none !important;
        }

        .analysis-text {
            flex: 1;
            font-size: 0.92rem;
            line-height: 1.85;
            color: var(--muted);
        }

        .analysis-text p { color: var(--muted); }
        .analysis-text strong { color: var(--text); }

    </style>
</head>
<body>

<header class="site-header">
    <div class="site-logo">CO2 <span>/ Analysis</span></div>
    <nav class="nav-links">
        <a href="index.html"   class="nav-btn"><i class="fas fa-home"></i> <span>Home</span></a>
        <a href="graphs.html"  class="nav-btn active"><i class="fas fa-chart-bar"></i> <span>Graphs</span></a>
        <a href="sources.html" class="nav-btn"><i class="fas fa-list"></i> <span>Sources</span></a>
    </nav>
</header>

<div class="container-wide">

    <!-- title + dropdown in one row, high z-index so dropdown floats above chart -->
    <div class="title-row fade-in">
        <div>
            <h1>Emission <span class="accent">Analysis</span></h1>
        </div>
        <div class="select-wrapper">
            <button class="select-btn" id="selectBtn" onclick="toggleMenu()">
                <span id="btnLabel">Select a Graph…</span>
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="options-list" id="menuList"></div>
        </div>
    </div>

    <!-- chart image + analysis text  -->
    <div class="content-area fade-in">
        <div class="chart-box" id="chartBox">
            <img id="chartImg" src="" alt="Graph">
        </div>
        <div class="analysis-text" id="analysisText">
            <p>Select a graph from the menu above to see the analysis.</p>
        </div>
    </div>

    <div class="footer-bar fade-in">
        <p>CO2 Emission Analysis &nbsp;·&nbsp; Graphs</p>
        <div class="footer-accent"></div>
        <p>Data: Kaggle &amp; Climate Trace</p>
    </div>

</div>

<script>
    // chart definitions with title, file path, and analysis text for each graph
    const charts = {
        scatter: {
            title: "Engine Size vs. CO2",
            file:  "Resources/Graph_Engine_Size.png",
            text:  `<p><strong>Primary Findings:</strong> Strong positive linear relationship between engine size and CO2 emissions.</p>
                    <p>The graph shows a positive linear relationship between engine size and CO2 emissions. As engine size increases, emissions rise at a fairly steady rate. The line of best fit, y = 33.81x + 147, suggests that every increase in emissions is 34 per L. Overall, there is a strong upward trend. This suggests that larger engines burn more fuel per kilometre, so the emissions increase almost proportionally. However, many points are below the line of best fit, showing that companies can design large yet efficient engines. It highlights that engine size alone doesn't fully explain emissions — companies can build efficient cars, but many choose not to.</p>`
        },
        cylinders: {
            title: "Cylinders Distribution",
            file:  "Resources/Graph_Cylinders.png",
            text:  `<p><strong>Primary Findings:</strong> CO₂ emissions rise as cylinder count increases, with especially large jumps beyond six cylinders.</p>
                    <p>As the number of cylinders increases, CO2 emissions increase generally. 4-cylinder cars show high variance, suggesting the manufacturer's design is a strong determining factor in eco-friendliness. The trend of higher cylinders equalling higher emissions holds clearly beyond 6 cylinders, with each distribution positively skewed.</p>`
        },
        transmission: {
            title: "Transmission Types",
            file:  "Resources/Graph_Transmission.png",
            text:  `<p><strong>Primary Findings:</strong> The most environmentally friendly transmission type is AM5 and it is so much more environmentally friendly relative to the other types, it is probably the primary transmission type you should be looking for as an environmentally conscious consumer.</p>
                    <p>This chart shows a clear relationship between transmission type and average CO2 emissions, with values ranging from 185.5 g/km (AM5) to 315.2 g/km (A10), a substantial difference of 166.7 g/km. Transmission types such as AM5, AV10 and AV6 produce the lowest emissions, all below 200 g/km, indicating greater fuel efficiency. In contrast A10, A7, and A4 have the highest average emissions, all exceeding 290 g/km. Most transmission types hover around 240 to 290 g/km, suggesting moderate high emissions are common across the dataset. Overall the results indicate that transmission types appear to have a significant impact on car CO2 emissions, although other factors such as engine size, car weight and fuel type may also influence the observed differences.</p>`
        },
        comparison: {
            title: "Fuel Type Comparison",
            file:  "Resources/Graph_Comparison_Ranked.png",
            text:  `<p><strong>Primary Findings:</strong> Based on this graph the most eco-friendly fuel is E10, so if customers were looking to purchase the most eco-friendly petrol based car they should look into E10 powered cars with high engine efficiency as this combination is to have the lowest emissions per km travelled.</p>
                    <p>All fuel sources generally increase in emissions as more petrol is used per 100km, therefore, looking at the bigger picture we can see that E10 ethanol was the most eco-friendly.  Ethanol was then followed by Regular U9 petrol, Diesel and Premium/Special Fuel. The difference between U9, Diesel and Special Fuel was within a margin of 20 g of CO2 per km, meaning in a real life situation the effect on the environment between each car running these 3 different fuels would be negligible. </p>`
        }
    };

    const fuelCharts = {
        ethanol: {
            title: "E10 / Ethanol",
            file:  "Resources/Graph_Trend_E10_Ethanol.png",
            text:  `<p><strong>Primary Findings:</strong> The lowest emission cars are usually the one that consume the least amount of fuel, and this yet again applies to E10 powered cars.
</p>
                    <p>This graph showcases the trend between emissions per 100km travelled by a car against the fuel consumed during that 100km distance. The trend also follows a mostly linear trend with minimal variance from the trend line.This indicates that CO2 emissions of E10  powered cars are directly tied to the efficiency of the engine. This fuel type on average was more efficient than the other fuel types.This data yet again emphasises that the most eco friendly cars are the efficient E10 powered cars, so environmentally aware purchasers who would want petrol powered cars can look towards this specific type of car.
</p>`
        },
        premium: {
            title: "Premium / Special",
            file:  "Resources/Graph_Trend_Premium_Special.png",
            text:  `<p><strong>Primary Findings:</strong> In general the higher efficiency cars were the most environmentally friendly and this applies to Premium/Special powered cars, however just note that on average this type of car is the most environmentally unfriendly relative to other fuel types.</p>
                    <p>This plots the emissions made per 100km travelled by a car, this is compared to the fuel used per 100km. The trend between these two variables is mostly linear. This trend however slows as fuel consumption passes 14L per 100km. Therefore, because the trend is mostly linear, the direct correlation between fuel consumption and emissions, the most eco-friendly special fuel powered cars are the ones with higher efficiency.</p>`
        },
        regular: {
            title: "U91 / Regular",
            file:  "Resources/Graph_Trend_U91_Regular.png",
            text:  `<p><strong>Primary Findings:</strong> When it comes to finding the most environmentally friendly U91 powered cars try to find the most efficient models as fuel efficiency has strong correlation with its emissions emitted, high efficiency = lower emissions.</p>
                    <p>This graph showcases fuel consumption displayed against its respective CO2 values in grams emitted during their 100km traveled. 95 Octane fuel (fuel type Z) powered cars, generally speaking as more diesel is burned by the engine the more CO2 is emitted, there is no threshold where the engine has its efficiency optimised. The trend that the graph is mostly linear suggesting that there is a direct correlation between the engine efficiency and the CO2 emissions.</p>`
        },
        diesel: {
            title: "Diesel",
            file:  "Resources/Graph_Trend_Diesel.png",
            text:  `<p><strong>Primary Findings:</strong> The same trend can be observed for diesel powered cars, a more fuel efficient car is equivalent to lower CO2 emissions per km traveled. However, considering Diesel is more the most pollutant fuel type, environment conscious consumers should be aware of this.</p>
                    <p>This graph depicts diesel usage consumption per 100km versus the emissions of CO2 from this 100km. The correlation between all values seems to be pretty strong following a relatively linear relationship, this illustrates that simply as more diesel is used the less environmentally friendly the car is. Overall, this means that the most emission friendly diesel cars are the ones that are the most efficient: the cars that consume the least amount of fuel to travel 100km.</p>`
        }
    };

    // dropdown
    const menuList     = document.getElementById('menuList');
    const btnLabel     = document.getElementById('btnLabel');
    const chartImg     = document.getElementById('chartImg');
    const analysisText = document.getElementById('analysisText');

    // regular items
    Object.values(charts).forEach(cfg => {
        const item = document.createElement('div');
        item.className   = 'option-item';
        item.textContent = cfg.title;
        item.onclick     = () => loadChart(cfg);
        menuList.appendChild(item);
    });

    // fuel group header
    const groupHeader = document.createElement('div');
    groupHeader.className = 'group-header';
    groupHeader.innerHTML = `<span>Fuel Types</span><i class="fas fa-chevron-down group-arrow"></i>`;
    menuList.appendChild(groupHeader);

    // fuel sub-items
    const subItems = document.createElement('div');
    subItems.className = 'sub-items';
    Object.values(fuelCharts).forEach(cfg => {
        const item = document.createElement('div');
        item.className   = 'sub-option-item';
        item.textContent = cfg.title;
        item.onclick     = () => loadChart(cfg);
        subItems.appendChild(item);
    });
    menuList.appendChild(subItems);

    groupHeader.addEventListener('click', e => {
        e.stopPropagation();
        groupHeader.classList.toggle('open');
        subItems.classList.toggle('open');
    });

    // dropdown toggle
    function toggleMenu() {
        menuList.classList.toggle('show');
        document.getElementById('selectBtn').classList.toggle('is-open');
    }

    // close when clicking anywhere outside
    window.addEventListener('click', e => {
        if (!e.target.closest('.select-wrapper')) {
            menuList.classList.remove('show');
            document.getElementById('selectBtn').classList.remove('is-open');
        }
    });

    // chart loading function to update image, alt text, analysis, and close menu
    function loadChart(cfg) {
        btnLabel.textContent   = cfg.title;
        chartImg.src           = cfg.file;
        chartImg.alt           = cfg.title;
        analysisText.innerHTML = cfg.text;
        menuList.classList.remove('show');
        document.getElementById('selectBtn').classList.remove('is-open');
    }

    // show first chart on load
    loadChart(Object.values(charts)[0]);
</script>

</body>
</html>
